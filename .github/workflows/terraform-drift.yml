name: Terraform Drift Detection

on:
  schedule:
    - cron: '17 13 * * 1'  # Mondays at 13:17 UTC (off-peak)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write    # SRE-4: open an issue on drift

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.5

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Drift detection is scoped to substrate IAM resources via -target.
      # Cross-account resources (aws_s3_bucket_policy.prod_data_lake) require
      # assuming the prod_admin role, which gha_plan is NOT trusted by (and
      # shouldn't be — write trust would defeat the admin/read separation).
      #
      # Cat 2 deferral per ADR 0003: refactor cross-account.tf into a separate
      # state file when ≥3 cross-account services exist. Trigger: 2nd
      # substrate writing to a prod resource. Until then, cross-account drift
      # is monitored via CloudTrail PutBucketPolicy events, not this workflow.
      - name: Terraform plan -detailed-exitcode
        id: plan
        working-directory: terraform
        run: |
          terraform init -input=false
          terraform plan -detailed-exitcode -refresh-only -no-color -input=false \
            -target=aws_iam_openid_connect_provider.github \
            -target=aws_iam_role.gha_plan \
            -target=aws_iam_role.gha_apply \
            -target=aws_iam_role.prod_data_lake_read \
            -target=aws_iam_policy.gha_plan_readonly \
            -target=aws_iam_policy.gha_apply_terraform \
            -target=aws_iam_role_policy_attachment.gha_plan \
            -target=aws_iam_role_policy_attachment.gha_apply \
            -target=aws_iam_role_policy.prod_data_lake_read \
            2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Open issue on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            const today = new Date().toISOString().slice(0, 10);
            const body = `Drift detected by weekly cron at ${today}.\n\n\`\`\`\n${planOutput}\n\`\`\``;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[drift-detected] Terraform plan diverged on ${today}`,
              body: body,
              labels: ['drift-detected']
            });

      - name: Fail job if plan errored (vs drift, which is exit 2)
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: exit 1
